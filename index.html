<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#000000" />
  <meta name="mobile-web-app-capable" content="yes" />
  <title>JARVIS</title>
  <link rel="manifest" href="manifest.json" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: #000; color: #c8eeff; font-family: monospace; overflow: hidden; }
    #app { display: flex; flex-direction: column; height: 100dvh; }
    #header { display: flex; align-items: center; justify-content: space-between; padding: 14px 16px; border-bottom: 1px solid rgba(0,212,255,0.25); background: rgba(0,20,35,0.9); }
    #logo { font-size: 20px; font-weight: bold; letter-spacing: 6px; color: #00d4ff; text-shadow: 0 0 20px #00d4ff; }
    #status { font-size: 10px; letter-spacing: 2px; padding: 4px 10px; border: 1px solid #0088aa; border-radius: 2px; color: #00d4ff; }
    #status.processing { color: #ffd700; border-color: #ffd700; }
    #status.error { color: #ff3a3a; border-color: #ff3a3a; }
    #status.listening { color: #00ff88; border-color: #00ff88; }
    #status.speaking { color: #ff88ff; border-color: #ff88ff; }
    #chat { flex: 1; overflow-y: auto; padding: 14px; display: flex; flex-direction: column; gap: 12px; }
    .msg { max-width: 88%; padding: 10px 14px; border-radius: 4px; font-size: 14px; line-height: 1.6; }
    .msg.user { align-self: flex-end; background: rgba(0,212,255,0.08); border: 1px solid rgba(0,212,255,0.3); color: #e0f7ff; }
    .msg.assistant { align-self: flex-start; background: rgba(4,20,35,0.95); border: 1px solid rgba(0,212,255,0.15); color: #c8eeff; }
    .lbl { font-size: 9px; letter-spacing: 2px; margin-bottom: 5px; opacity: 0.5; }
    .msg.user .lbl { color: #00d4ff; text-align: right; }
    .msg.assistant .lbl { color: #ffd700; }
    #typing { display: none; align-self: flex-start; padding: 10px 14px; background: rgba(4,20,35,0.95); border: 1px solid rgba(0,212,255,0.15); border-radius: 4px; font-size: 11px; letter-spacing: 2px; color: #00d4ff; }
    #typing.show { display: block; }
    #voice-panel { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.92); z-index: 100; flex-direction: column; padding: 30px 20px; gap: 12px; overflow-y: auto; }
    #voice-panel.show { display: flex; }
    #voice-panel h2 { color: #00d4ff; letter-spacing: 4px; font-size: 14px; margin-bottom: 10px; }
    .voice-opt { padding: 12px 16px; border: 1px solid rgba(0,212,255,0.25); border-radius: 4px; color: #c8eeff; font-family: monospace; font-size: 13px; background: rgba(0,212,255,0.05); cursor: pointer; }
    .voice-opt.active { border-color: #00d4ff; color: #00d4ff; background: rgba(0,212,255,0.12); }
    #close-voices { margin-top: 10px; padding: 12px; border: 1px solid #ff3a3a; border-radius: 4px; color: #ff3a3a; background: transparent; font-family: monospace; font-size: 13px; letter-spacing: 2px; cursor: pointer; }
    #bottom { border-top: 1px solid rgba(0,212,255,0.25); background: rgba(0,10,20,0.98); padding: 10px 14px 24px; }
    #api-row { display: flex; gap: 8px; margin-bottom: 10px; }
    #api-key { flex: 1; background: rgba(0,212,255,0.05); border: 1px solid rgba(0,212,255,0.25); border-radius: 3px; color: #c8eeff; font-family: monospace; font-size: 12px; padding: 8px 10px; outline: none; }
    #save-key { background: rgba(0,212,255,0.1); border: 1px solid #0088aa; border-radius: 3px; color: #00d4ff; font-size: 11px; letter-spacing: 1px; padding: 0 12px; cursor: pointer; }
    #msg-row { display: flex; gap: 8px; align-items: flex-end; }
    #msg-input { flex: 1; background: rgba(0,212,255,0.05); border: 1px solid rgba(0,212,255,0.25); border-radius: 3px; color: #c8eeff; font-family: monospace; font-size: 14px; padding: 10px 12px; outline: none; resize: none; max-height: 100px; min-height: 42px; }
    .btn { width: 44px; height: 44px; border-radius: 3px; border: 1px solid #0088aa; background: rgba(0,212,255,0.08); color: #00d4ff; font-size: 20px; display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; }
    .btn.listening { border-color: #00ff88; color: #00ff88; }
    .btn.speaking { border-color: #ff88ff; color: #ff88ff; }
  </style>
</head>
<body>
<div id="voice-panel">
  <h2>SELECT JARVIS VOICE</h2>
  <div id="voice-list"></div>
  <button id="close-voices">CLOSE</button>
</div>
<div id="app">
  <div id="header">
    <div id="logo">J.A.R.V.I.S</div>
    <div id="status">STANDBY</div>
  </div>
  <div id="chat">
    <div class="msg assistant">
      <div class="lbl">JARVIS</div>
      Good day. I am J.A.R.V.I.S. Enter your Gemini API key below to begin. All systems standing by, sir.
    </div>
  </div>
  <div id="typing">⬛ PROCESSING...</div>
  <div id="bottom">
    <div id="api-row">
      <input id="api-key" type="password" placeholder="Gemini API key" autocomplete="off" />
      <button id="save-key">SAVE</button>
    </div>
    <div id="msg-row">
      <textarea id="msg-input" placeholder="Your query, sir..." rows="1"></textarea>
      <button class="btn" id="voice-btn" title="Change voice">🎛️</button>
      <button class="btn" id="mic-btn" title="Speak">🎙️</button>
      <button class="btn" id="send-btn" title="Send">➤</button>
    </div>
  </div>
</div>
<script>
const SYSTEM = `You are J.A.R.V.I.S (Just A Rather Very Intelligent System), the advanced AI created by Tony Stark. You are calm, intelligent, precise, and occasionally witty. You always address the user as "sir" or "ma'am". You never break character. Keep responses concise and clear for voice output.`;

let messages = [], busy = false, selectedVoice = null, voices = [];

const chat = document.getElementById('chat');
const input = document.getElementById('msg-input');
const sendBtn = document.getElementById('send-btn');
const micBtn = document.getElementById('mic-btn');
const voiceBtn = document.getElementById('voice-btn');
const status = document.getElementById('status');
const typing = document.getElementById('typing');
const apiKey = document.getElementById('api-key');
const voicePanel = document.getElementById('voice-panel');
const voiceList = document.getElementById('voice-list');

const saved = localStorage.getItem('gemini_key');
if (saved) apiKey.value = saved;

const savedVoiceName = localStorage.getItem('jarvis_voice');

document.getElementById('save-key').onclick = () => {
  const k = apiKey.value.trim();
  if (k) { localStorage.setItem('gemini_key', k); alert('API key saved!'); }
};

// ── VOICES ──
function loadVoices() {
  voices = speechSynthesis.getVoices();
  if (!voices.length) return;
  voiceList.innerHTML = '';
  voices.forEach((v, i) => {
    const btn = document.createElement('button');
    btn.className = 'voice-opt' + (v.name === savedVoiceName ? ' active' : '');
    btn.textContent = `${v.name} (${v.lang})`;
    btn.onclick = () => {
      selectedVoice = v;
      localStorage.setItem('jarvis_voice', v.name);
      document.querySelectorAll('.voice-opt').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      // Preview voice
      const u = new SpeechSynthesisUtterance('Voice selected, sir.');
      u.voice = v; u.rate = 0.95; u.pitch = 0.9;
      speechSynthesis.speak(u);
    };
    voiceList.appendChild(btn);
    if (v.name === savedVoiceName) selectedVoice = v;
  });
}

speechSynthesis.onvoiceschanged = loadVoices;
loadVoices();

voiceBtn.onclick = () => { loadVoices(); voicePanel.classList.add('show'); };
document.getElementById('close-voices').onclick = () => voicePanel.classList.remove('show');

// ── SPEAK ──
function speak(text) {
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  if (selectedVoice) u.voice = selectedVoice;
  u.rate = 0.95; u.pitch = 0.9; u.volume = 1;
  status.textContent = 'SPEAKING'; status.className = 'speaking';
  micBtn.classList.add('speaking');
  u.onend = () => { status.textContent = 'STANDBY'; status.className = ''; micBtn.classList.remove('speaking'); };
  speechSynthesis.speak(u);
}

// ── ADD MESSAGE ──
function addMsg(role, text) {
  const d = document.createElement('div');
  d.className = 'msg ' + role;
  d.innerHTML = `<div class="lbl">${role === 'user' ? 'YOU' : 'JARVIS'}</div>${text}`;
  chat.appendChild(d);
  messages.push({ role: role === 'assistant' ? 'model' : 'user', parts: [{ text }] });
  chat.scrollTop = chat.scrollHeight;
}

// ── SEND ──
async function send() {
  const text = input.value.trim();
  if (!text || busy) return;
  const key = localStorage.getItem('gemini_key') || apiKey.value.trim();
  if (!key) { alert('Please enter and save your Gemini API key first!'); return; }
  busy = true; input.value = ''; sendBtn.disabled = true; micBtn.disabled = true;
  addMsg('user', text);
  typing.classList.add('show'); status.textContent = 'PROCESSING'; status.className = 'processing';
  try {
    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${key}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        system_instruction: { parts: [{ text: SYSTEM }] },
        contents: messages
      })
    });
    const data = await res.json();
    if (data.error) throw new Error(data.error.message);
    const reply = data.candidates?.[0]?.content?.parts?.[0]?.text || 'No response, sir.';
    typing.classList.remove('show');
    addMsg('assistant', reply);
    speak(reply);
  } catch (e) {
    typing.classList.remove('show');
    addMsg('assistant', 'System error, sir: ' + e.message);
    status.textContent = 'ERROR'; status.className = 'error';
  }
  busy = false; sendBtn.disabled = false; micBtn.disabled = false;
}

sendBtn.onclick = send;
input.addEventListener('keydown', e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); } });
input.addEventListener('input', () => { input.style.height = 'auto'; input.style.height = Math.min(input.scrollHeight, 100) + 'px'; });

// ── MIC ──
const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
if (SR) {
  const r = new SR(); r.lang = 'en-US';
  r.onresult = e => { input.value = e.results[0][0].transcript; micBtn.classList.remove('listening'); send(); };
  r.onend = () => { micBtn.classList.remove('listening'); if (status.textContent === 'LISTENING') { status.textContent = 'STANDBY'; status.className = ''; } };
  micBtn.onclick = () => {
    speechSynthesis.cancel();
    r.start(); micBtn.classList.add('listening');
    status.textContent = 'LISTENING'; status.className = 'listening';
  };
} else { micBtn.disabled = true; micBtn.style.opacity = '0.3'; }

if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(() => {});
</script>
</body>
</html>
